name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-format-test:
    name: Lint, format, and test
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Run unit tests
        run: pytest

      - name: Validate knowledge base
        run: python scripts/validate_knowledge_base.py

      - name: Validate knowledge base metadata
        run: python scripts/validate_metadata.py

      - name: Validate knowledge base references
        run: python scripts/validate_references.py

      - name: Validate knowledge base links
        run: python scripts/validate_links.py

      - name: Build knowledge base index preview
        run: python scripts/build_index_preview.py
