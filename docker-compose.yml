# Optional local deployment scaffold for future offline runtime testing.
# No AI service is implemented yet; this file preserves deployment intent.

services:
  poultryguard-ai:
    image: poultryguard-ai:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./knowledge_base:/app/knowledge_base:ro
      - ./models/gguf:/app/models/gguf:ro
      - ./vector_store:/app/vector_store
    command: ["python", "-m", "app.backend.main"]
    profiles:
      - future-runtime

